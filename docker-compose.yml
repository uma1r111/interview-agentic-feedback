#   By mounting local folders (. and ./frontend) into the containers, we bypass
#   the static container filesystem image layer. Changes made locally reflect
#   instantly via hot-reloading.
#

version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres_db:
    image: postgres:15-alpine
    container_name: platform_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_db_password}
      POSTGRES_DB: ${POSTGRES_DB:-interview_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interview_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform_network
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis_cache:
    image: redis:7-alpine
    container_name: platform_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - platform_network
    restart: unless-stopped

  # ── Backend (FastAPI with Hot-Reload) ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secure_db_password}@platform_postgres:5432/${POSTGRES_DB:-interview_db}
      REDIS_URL: redis://platform_redis:6379/0
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      OPENAI_API_VERSION: ${OPENAI_API_VERSION}
      AZURE_OPENAI_CHAT_DEPLOYMENT_NAME: ${AZURE_OPENAI_CHAT_DEPLOYMENT_NAME}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      TOKEN_ALERT_THRESHOLD: ${TOKEN_ALERT_THRESHOLD:-80000}
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    volumes:
      - .:/app                 # Mounts the full backend folder into the container
      - /app/.venv             # Prevents local directory states from overwriting container virtual env
      - ./fixtures:/app/fixtures
      - ./rubrics:/app/rubrics
    # Overrides the production CMD execution string to trigger Uvicorn's file watcher loop:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - platform_network
    restart: unless-stopped

  # ── Frontend (Next.js with Fast-Watch) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: platform_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app         # Mounts the local frontend workspace folder
      - /app/.next             # Protects the containerized Next.js internal build compilation artifacts
      - /app/node_modules      # Protects the production package layer inside Linux container architecture
    # Overrides production "npm run start" with development hot-reloaded bundler:
    command: npm run dev
    networks:
      - platform_network
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  platform_network:
    driver: bridge